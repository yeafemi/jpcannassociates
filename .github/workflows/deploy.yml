name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          npm run build
          
          # Smart Search for index.html
          echo "Searching for index.html..."
          INDEX_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" | head -n 1)
          
          if [ -z "$INDEX_PATH" ]; then
            echo "Error: index.html not found anywhere in the build output!"
            ls -R
            exit 1
          fi
          
          OUT_DIR=$(dirname "$INDEX_PATH")
          echo "Detected output directory: $OUT_DIR"
          
          # Copy index to 404 for SPA routing
          cp "$INDEX_PATH" "$OUT_DIR/404.html"
          echo "FINAL_OUT_DIR=$OUT_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_OUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
