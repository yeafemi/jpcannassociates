name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          npm run build
          
          # Debug: List directories to see where build output went
          echo "Checking build output directories..."
          ls -d dist*/ .output*/ 2>/dev/null || echo "No output directories found yet."
          
          # Auto-detect folder
          if [ -d "dist/client" ]; then
            OUT_DIR="dist/client"
          elif [ -d "dist" ]; then
            OUT_DIR="dist"
          elif [ -d ".output/public" ]; then
            OUT_DIR=".output/public"
          else
            echo "Error: No build output directory found!"
            ls -R
            exit 1
          fi
          
          echo "Detected output directory: $OUT_DIR"
          
          # Copy index to 404 for SPA routing
          if [ -f "$OUT_DIR/index.html" ]; then
            cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          fi
          
          echo "FINAL_OUT_DIR=$OUT_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_OUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
