name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          if [ -d "dist/client" ]; then
            cp dist/client/index.html dist/client/404.html
            echo "OUT_DIR=dist/client" >> $GITHUB_ENV
          elif [ -d "dist" ]; then
            cp dist/index.html dist/404.html
            echo "OUT_DIR=dist" >> $GITHUB_ENV
          elif [ -d ".output/public" ]; then
            cp .output/public/index.html .output/public/404.html
            echo "OUT_DIR=.output/public" >> $GITHUB_ENV
          else
            echo "Error: index.html not found."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
