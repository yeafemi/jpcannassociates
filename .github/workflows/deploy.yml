name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: "https://ozbipjoexffztrikdyjr.supabase.co"
      VITE_SUPABASE_ANON_KEY: "sb_publishable__lF0kj6Qxq_PCAouznErGw_hONEUY6c"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          npm run build
          
          # Find the built index.html
          echo "Locating built index.html..."
          INDEX_PATH=$(find . \( -path "*/dist/*" -o -path "*/.output/*" \) -name "index.html" | head -n 1)
          
          if [ -z "$INDEX_PATH" ]; then
            echo "Error: Could not find index.html in build output."
            find . -maxdepth 3 -not -path "*/node_modules/*"
            exit 1
          fi
          
          OUT_DIR=$(dirname "$INDEX_PATH")
          echo "Final deployment directory: $OUT_DIR"
          
          # Debug: Show the built index.html content
          echo "Built index.html content:"
          cat "$INDEX_PATH"
          
          # Copy index to 404 for SPA routing
          cp "$INDEX_PATH" "$OUT_DIR/404.html"
          # Create .nojekyll to prevent GitHub from ignoring files starting with underscores
          touch "$OUT_DIR/.nojekyll"
          echo "FINAL_OUT_DIR=$OUT_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_OUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
