name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          npm run build
          # Find the output directory
          if [ -d "dist/client" ]; then
            export OUT_DIR="dist/client"
          elif [ -d "dist" ]; then
            export OUT_DIR="dist"
          elif [ -d ".output/public" ]; then
            export OUT_DIR=".output/public"
          fi
          
          # Copy index to 404 for SPA routing
          cp $OUT_DIR/index.html $OUT_DIR/404.html
          echo "FINAL_OUT_DIR=$OUT_DIR" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FINAL_OUT_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
